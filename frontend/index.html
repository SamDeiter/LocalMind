<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LocalMind — Your Private AI</title>
    <meta name="description" content="LocalMind: A fully local, private AI assistant with tool use, memory, and vision.">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <!-- Syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <!-- Markdown parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Our styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">

        <!-- ============================================================ -->
        <!-- SIDEBAR — Conversations + learning toggle                     -->
        <!-- ============================================================ -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🧠</span>
                    <span class="logo-text">LocalMind</span>
                </div>
                <button class="btn-icon" id="newChatBtn" title="New Chat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                </button>
            </div>

            <!-- Conversation list (populated by JS) -->
            <div class="conversation-list" id="conversationList"></div>

            <!-- Learning mode toggle -->
            <div class="sidebar-footer">
                <div class="memory-toggle">
                    <label class="toggle-label">
                        <span>🧠 Learning</span>
                        <input type="checkbox" id="learningToggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>
                <div class="sidebar-section">
            <div class="sidebar-section-header" id="docsToggle">📚 Documents <span id="docCount" class="badge">0</span></div>
            <div id="documentList" class="document-list"></div>
        </div>
        <div id="versionBadge" class="version-badge" title="Build info">v0.3.0 #1</div>
    </aside>

        <!-- ============================================================ -->
        <!-- MAIN CHAT AREA                                                -->
        <!-- ============================================================ -->
        <main class="main-content">

            <!-- Top bar — model selector, voice, settings -->
            <header class="top-bar">
                <button class="btn-icon sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <line x1="3" y1="12" x2="21" y2="12"/>
                        <line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>

                <div class="model-selector">
                    <select id="modelSelect"><option value="">Loading models...</option></select>
                </div>

                <div class="top-bar-actions">
                    <!-- Voice output toggle -->
                    <button class="btn-icon" id="voiceToggle" title="Toggle Voice Output">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 5L6 9H2v6h4l5 4V5z"/>
                            <path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/>
                        </svg>
                    </button>
                    <!-- Voice picker dropdown -->
                    <select id="voiceSelect" class="voice-select" title="Choose a voice for speech output">
                        <option value="">Default</option>
                    </select>
                    <!-- System prompt editor toggle -->
                    <button class="btn-icon" id="systemPromptBtn" title="System Prompt">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Collapsible system prompt editor -->
            <div class="system-prompt-panel" id="systemPromptPanel">
                <textarea id="systemPromptText" placeholder="Enter a custom system prompt..."></textarea>
                <div class="prompt-actions">
                    <button class="btn-secondary" id="resetPromptBtn">Reset Default</button>
                    <button class="btn-primary" id="savePromptBtn">Save</button>
                </div>
            </div>

            <!-- Chat messages (populated by JS) -->
            <div class="messages-container" id="messagesContainer">
                <!-- Welcome screen shown when no conversation is active -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">🧠</div>
                    <h1>LocalMind</h1>
                    <p>Your private AI assistant. Everything runs locally.</p>
                    <div class="feature-grid">
                        <div class="feature-card" data-prompt="Search the web for the latest AI news">
                            <span class="feature-icon">🔍</span><span>Web Search</span>
                        </div>
                        <div class="feature-card" data-prompt="Take a screenshot and tell me what you see">
                            <span class="feature-icon">📸</span><span>Screenshot</span>
                        </div>
                        <div class="feature-card" data-prompt="What do you remember about me?">
                            <span class="feature-icon">🧠</span><span>Memory</span>
                        </div>
                        <div class="feature-card" data-prompt="Write a Python script that prints the Fibonacci sequence">
                            <span class="feature-icon">💻</span><span>Code</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Input area — camera button, text input, send -->
            <div class="input-area">
                <div class="image-preview" id="imagePreview" style="display:none">
                    <img id="previewImg" alt="Captured image preview">
                    <button class="btn-icon remove-image" id="removeImageBtn" title="Remove image">✕</button>
                </div>
                <div class="input-container">
                    <div class="input-actions-left">
                        <button class="btn-icon" id="cameraBtn" title="Capture from camera">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                                <circle cx="12" cy="13" r="4"/>
                            </svg>
                        </button>
                        <button class="btn-icon" id="micBtn" title="Voice input (click to speak)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="1" width="6" height="11" rx="3"/>
                                <path d="M19 10a7 7 0 01-14 0"/>
                                <line x1="12" y1="19" x2="12" y2="23"/>
                                <line x1="8" y1="23" x2="16" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <textarea id="messageInput" placeholder="Ask me anything..." rows="1"></textarea>
                    <div class="input-actions-right">
                        <button class="btn-send" id="sendBtn" title="Send message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ================================================================ -->
    <!-- CAMERA MODAL — WebRTC webcam capture                              -->
    <!-- ================================================================ -->
    <div class="modal" id="cameraModal" style="display:none">
        <div class="modal-content">
            <h3>📷 Camera Capture</h3>
            <video id="cameraPreview" autoplay playsinline></video>
            <div class="modal-actions">
                <button class="btn-secondary" id="closeCameraBtn">Cancel</button>
                <button class="btn-primary" id="snapBtn">📸 Capture</button>
            </div>
        </div>
    </div>

    <!-- Hidden canvas for webcam frame capture -->
    <canvas id="captureCanvas" style="display:none"></canvas>

    <!-- App logic -->
    <script src="app.js"></script>
</body>
</html>
