<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="LocalMind — Your private, local AI coding assistant powered by Ollama."
    />
    <title>LocalMind — Local AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <span class="logo-icon">🧠</span>
            <span class="logo-text">LocalMind</span>
          </div>
          <button class="btn-icon" id="newChatBtn" title="New Chat">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="12" y1="5" x2="12" y2="19"></line>
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
        </div>
        <div class="conversation-list" id="conversationList">
          <!-- Conversations populated by JS -->
        </div>
        <div class="sidebar-footer">
          <div class="model-selector">
            <label for="modelSelect">Model</label>
            <select id="modelSelect">
              <option value="qwen2.5-coder:32b">Qwen 2.5 Coder 32B</option>
            </select>
          </div>
          <button class="btn-settings" id="settingsBtn">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3"></circle>
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              ></path>
            </svg>
            <span>Settings</span>
          </button>
          <div class="status-indicator" id="statusIndicator">
            <span class="status-dot"></span>
            <span class="status-text">Connecting...</span>
          </div>
        </div>
      </aside>

      <!-- Main Chat Area -->
      <main class="main-content">
        <header class="chat-header">
          <button class="btn-icon sidebar-toggle" id="sidebarToggle">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="3" y1="12" x2="21" y2="12"></line>
              <line x1="3" y1="6" x2="21" y2="6"></line>
              <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
          </button>
          <h1 id="chatTitle">New Conversation</h1>
          <button class="btn-icon" id="editTitleBtn" title="Edit title">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"
              ></path>
              <path
                d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"
              ></path>
            </svg>
          </button>
        </header>

        <!-- Messages -->
        <div class="messages-container" id="messagesContainer">
          <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-icon">🧠</div>
            <h2>Welcome to LocalMind</h2>
            <p>Your private AI coding assistant running 100% locally.</p>
            <div class="quick-prompts">
              <button
                class="quick-prompt"
                data-prompt="Write a Python function to parse a CSV file and return a list of dictionaries"
              >
                <span class="qp-icon">🐍</span>
                <span>Parse a CSV file</span>
              </button>
              <button
                class="quick-prompt"
                data-prompt="Explain the difference between async/await and Promises in JavaScript"
              >
                <span class="qp-icon">📘</span>
                <span>Async vs Promises</span>
              </button>
              <button
                class="quick-prompt"
                data-prompt="Write a SQL query to find duplicate records in a table"
              >
                <span class="qp-icon">🗃️</span>
                <span>Find SQL duplicates</span>
              </button>
              <button
                class="quick-prompt"
                data-prompt="Review this code for security vulnerabilities and suggest improvements"
              >
                <span class="qp-icon">🔒</span>
                <span>Security code review</span>
              </button>
            </div>
          </div>
          <div class="messages" id="messages"></div>
        </div>

        <!-- Input Area -->
        <div class="input-area">
          <div class="input-container">
            <textarea
              id="messageInput"
              placeholder="Ask me anything about code..."
              rows="1"
              autofocus
            ></textarea>
            <button class="btn-send" id="sendBtn" title="Send message">
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
            <button
              class="btn-stop hidden"
              id="stopBtn"
              title="Stop generating"
            >
              <svg
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <rect x="6" y="6" width="12" height="12" rx="2"></rect>
              </svg>
            </button>
          </div>
          <p class="input-hint">
            Running locally via Ollama ·
            <span id="activeModel">qwen2.5-coder:32b</span>
          </p>
        </div>
      </main>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay hidden" id="settingsModal">
      <div class="modal">
        <div class="modal-header">
          <h2>Settings</h2>
          <button class="btn-icon modal-close" id="closeSettings">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label for="systemPrompt">System Prompt</label>
            <textarea
              id="systemPrompt"
              rows="6"
              placeholder="You are a helpful coding assistant..."
            >
You are LocalMind, a helpful and skilled AI coding assistant. You write clean, well-documented code with clear explanations. When asked to write code, always include comments. When debugging, explain the root cause before the fix.</textarea
            >
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-secondary" id="resetPromptBtn">
            Reset to Default
          </button>
          <button class="btn-primary" id="saveSettingsBtn">Save</button>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
